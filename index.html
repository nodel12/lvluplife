<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LvlUpLife2">
<meta name="theme-color" content="#0a0e14">
<title>LvlUpLife2</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   RESET & ROOT
═══════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0e14;
  --bg2:#111820;
  --bg3:#1a2332;
  --card:#0f1923;
  --card2:#162030;
  --cyan:#00e5ff;
  --cyan-dim:#00b8cc;
  --green:#39ff14;
  --green-dim:#2acc0f;
  --gold:#ffd700;
  --orange:#ff6b00;
  --red:#ff3355;
  --purple:#9b59ff;
  --text:#d0e8f0;
  --muted:#4a7a8a;
  --muted2:#7aaabb;
  --border:#1e3348;
  --border2:#2a4a6a;
  --pixel:'Press Start 2P',monospace;
  --vt:'VT323',monospace;
  --mono:'Share Tech Mono',monospace;
  --safe-b:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--mono);
  font-size:14px;
  position:fixed;width:100%;
}
/* scanlines */
body::after{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,230,255,0.015) 2px,rgba(0,230,255,0.015) 4px);
  pointer-events:none;z-index:9998;
}

/* ═══════════════════════════════════════════
   TYPOGRAPHY
═══════════════════════════════════════════ */
.pixel{font-family:var(--pixel)}
.vt{font-family:var(--vt);font-size:20px;line-height:1.2}
h1,h2,h3{font-family:var(--pixel)}

/* ═══════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  font-family:var(--pixel);font-size:9px;letter-spacing:.5px;
  padding:10px 18px;border:2px solid;cursor:pointer;
  transition:all .1s;white-space:nowrap;text-transform:uppercase;
}
.btn:active{transform:scale(.97)}
.btn-cyan{background:var(--cyan);color:#000;border-color:var(--cyan);box-shadow:0 0 12px rgba(0,229,255,.4)}
.btn-cyan:hover{background:var(--cyan-dim);box-shadow:0 0 20px rgba(0,229,255,.6)}
.btn-green{background:var(--green);color:#000;border-color:var(--green);box-shadow:0 0 12px rgba(57,255,20,.4)}
.btn-green:hover{box-shadow:0 0 20px rgba(57,255,20,.6)}
.btn-ghost{background:transparent;color:var(--text);border-color:var(--border2)}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-danger{background:transparent;color:var(--red);border-color:var(--red)}
.btn-purple{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn-full{width:100%}
.btn-sm{padding:6px 12px;font-size:8px}
.btn-lg{padding:14px 28px;font-size:11px}

/* ═══════════════════════════════════════════
   INPUTS
═══════════════════════════════════════════ */
input,textarea,select{
  font-family:var(--mono);font-size:14px;
  background:var(--bg3);border:1px solid var(--border2);
  color:var(--text);padding:10px 14px;outline:none;width:100%;
  transition:border-color .2s;-webkit-appearance:none;
}
input:focus,textarea:focus,select:focus{border-color:var(--cyan);box-shadow:0 0 8px rgba(0,229,255,.2)}
input::placeholder{color:var(--muted)}

/* ═══════════════════════════════════════════
   APP SHELL
═══════════════════════════════════════════ */
#app{display:flex;flex-direction:column;height:100%}

/* ═══════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════ */
.topbar{
  background:var(--cyan);
  padding:0 16px;
  height:calc(48px + env(safe-area-inset-top,0px));
  padding-top:env(safe-area-inset-top,0px);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;position:relative;z-index:10;
}
.topbar-logo{
  font-family:var(--pixel);font-size:13px;color:#000;
  letter-spacing:1px;cursor:pointer;user-select:none;
}
.topbar-right{display:flex;align-items:center;gap:8px}
.topbar-btn{
  font-family:var(--pixel);font-size:8px;
  background:transparent;border:2px solid #000;color:#000;
  padding:5px 10px;cursor:pointer;
}
.topbar-btn:hover{background:#000;color:var(--cyan)}

/* ═══════════════════════════════════════════
   PAGES
═══════════════════════════════════════════ */
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none}
.page.active{display:block}
.page-content{padding:20px 16px;padding-bottom:calc(80px + var(--safe-b))}

/* ═══════════════════════════════════════════
   BOTTOM NAV
═══════════════════════════════════════════ */
.bottom-nav{
  background:var(--bg2);border-top:2px solid var(--cyan);
  display:flex;flex-shrink:0;
  padding-bottom:var(--safe-b);position:relative;z-index:10;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 4px 8px;cursor:pointer;color:var(--muted2);
  border:none;background:none;font-family:var(--pixel);
  transition:color .15s;
}
.nav-btn .ni{font-size:20px;margin-bottom:3px;line-height:1}
.nav-btn .nl{font-size:6px;text-transform:uppercase;letter-spacing:.5px}
.nav-btn.active{color:var(--cyan)}
.nav-btn.active .ni{filter:drop-shadow(0 0 4px var(--cyan))}

/* ═══════════════════════════════════════════
   LOGIN PAGE
═══════════════════════════════════════════ */
.login-page{
  position:fixed;inset:0;z-index:500;
  background:var(--bg);display:flex;flex-direction:column;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.login-page.hidden{display:none}
.login-hero{
  background:var(--cyan);padding:16px;text-align:center;
  padding-top:calc(16px + env(safe-area-inset-top,0px));
}
.login-logo{font-family:var(--pixel);font-size:18px;color:#000;letter-spacing:2px}
.login-tagline{font-family:var(--mono);font-size:13px;color:#003344;margin-top:6px}
.login-body{padding:24px 20px;max-width:480px;margin:0 auto;width:100%}
.login-subtitle{
  font-family:var(--pixel);font-size:10px;color:var(--cyan);
  text-align:center;margin-bottom:6px;
}
.login-sub2{font-size:12px;color:var(--muted2);text-align:center;margin-bottom:24px}
.form-label{
  display:block;font-family:var(--pixel);font-size:8px;color:var(--cyan);
  margin-bottom:6px;letter-spacing:.5px;
}
.form-group{margin-bottom:14px}
.login-tabs{display:flex;margin-bottom:24px;border:2px solid var(--border2)}
.login-tab{
  flex:1;padding:10px;text-align:center;font-family:var(--pixel);font-size:8px;
  cursor:pointer;color:var(--muted2);background:transparent;border:none;
  transition:all .15s;text-transform:uppercase;
}
.login-tab.active{background:var(--cyan);color:#000}
.login-err{color:var(--red);font-size:11px;text-align:center;margin:8px 0;min-height:16px;font-family:var(--mono)}
.avatar-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:6px}
.av-opt{
  aspect-ratio:1;border:2px solid var(--border2);background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:22px;
  cursor:pointer;transition:all .15s;
}
.av-opt.sel{border-color:var(--cyan);background:rgba(0,229,255,.1);box-shadow:0 0 8px rgba(0,229,255,.3)}
.login-divider{
  text-align:center;font-family:var(--pixel);font-size:8px;
  color:var(--muted);margin:20px 0;
  display:flex;align-items:center;gap:12px;
}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* ═══════════════════════════════════════════
   FEED PAGE
═══════════════════════════════════════════ */
.feed-header{
  background:var(--bg2);border:1px solid var(--border);
  padding:14px;margin-bottom:16px;
}
.char-bar{display:flex;align-items:center;gap:12px}
.char-av{
  width:52px;height:52px;background:var(--bg3);border:2px solid var(--cyan);
  display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;
}
.char-info{flex:1;min-width:0}
.char-name{font-family:var(--pixel);font-size:10px;color:var(--cyan);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.char-class{font-size:11px;color:var(--muted2);margin-bottom:6px}
.xp-bar-wrap{background:var(--bg3);border:1px solid var(--border2);height:10px;position:relative}
.xp-bar-fill{height:100%;background:var(--green);transition:width .5s}
.xp-bar-label{font-size:10px;color:var(--muted2);margin-top:3px;font-family:var(--mono)}
.char-stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:12px}
.cs-box{background:var(--bg3);border:1px solid var(--border);padding:6px;text-align:center}
.cs-val{font-family:var(--pixel);font-size:10px;color:var(--green)}
.cs-label{font-size:9px;color:var(--muted);margin-top:2px}

.streak-bar{
  background:linear-gradient(135deg,rgba(255,107,0,.15),rgba(255,215,0,.08));
  border:1px solid rgba(255,107,0,.4);padding:10px 14px;
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
}

.feed-title{
  font-family:var(--pixel);font-size:9px;color:var(--cyan);
  margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;animation:blink 1.2s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.feed-item{
  background:var(--card);border:1px solid var(--border);
  margin-bottom:10px;padding:12px;display:flex;gap:10px;
  animation:fadeIn .3s ease both;
}
.feed-item.ach{border-color:rgba(255,215,0,.3);background:linear-gradient(135deg,var(--card),rgba(255,215,0,.04))}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.feed-av{
  width:56px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;
}
.feed-av-img{
  width:48px;height:48px;background:var(--bg3);border:2px solid var(--border2);
  display:flex;align-items:center;justify-content:center;font-size:24px;
}
.feed-av-level{font-family:var(--pixel);font-size:7px;color:var(--cyan)}
.feed-body{flex:1;min-width:0}
.feed-username{font-family:var(--pixel);font-size:9px;color:var(--cyan);margin-bottom:3px}
.feed-completed{font-size:11px;color:var(--muted2);margin-bottom:6px}
.feed-quest-box{
  background:var(--bg2);border-left:3px solid var(--cyan);
  padding:8px 10px;margin-bottom:6px;
}
.feed-quest-icon{font-size:16px;margin-right:6px;vertical-align:middle}
.feed-quest-text{font-family:var(--vt);font-size:18px;line-height:1.3;color:var(--text)}
.feed-note{
  font-size:12px;color:var(--muted2);font-style:italic;
  margin-bottom:6px;padding:4px 8px;border-left:2px solid var(--border2);
}
.feed-xp-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.stat-chip{font-family:var(--pixel);font-size:7px;padding:2px 6px;background:var(--bg3)}
.stat-chip.str{color:#f87171}.stat-chip.int{color:#60a5fa}.stat-chip.agi{color:#34d399}
.stat-chip.wis{color:#f59e0b}.stat-chip.cha{color:#f472b6}.stat-chip.vit{color:#a78bfa}
.stat-chip.cre{color:#fb923c}.stat-chip.wan{color:#06b6d4}
.xp-earned{font-family:var(--pixel);font-size:9px;color:var(--green);margin-left:auto}

.ach-feed-box{
  background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.25);
  padding:8px 10px;display:flex;align-items:center;gap:8px;margin-bottom:6px;
}

/* ═══════════════════════════════════════════
   QUESTS PAGE
═══════════════════════════════════════════ */
.cat-scroller{
  display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.cat-scroller::-webkit-scrollbar{display:none}
.cat-chip{
  display:flex;align-items:center;gap:6px;
  padding:7px 12px;border:1px solid var(--border2);background:var(--card);
  font-family:var(--pixel);font-size:7px;white-space:nowrap;cursor:pointer;
  color:var(--muted2);transition:all .15s;flex-shrink:0;text-transform:uppercase;
}
.cat-chip.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,.08)}
.cat-chip .cdot{width:5px;height:5px;background:var(--green);display:none;flex-shrink:0}
.cat-chip.hp .cdot{display:block}

.cat-header{margin-bottom:14px}
.cat-title-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cat-icon-big{font-size:28px}
.cat-title{font-family:var(--pixel);font-size:11px;color:var(--cyan)}
.cat-prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted2);margin-bottom:4px}

.add-quest-row{display:flex;gap:6px;margin-bottom:14px}
.add-quest-row input{flex:1;font-size:13px}
.add-quest-row select{width:auto;padding:10px 8px;font-size:12px}

.quest-row{
  background:var(--card);border:1px solid var(--border);
  padding:12px;display:flex;align-items:flex-start;gap:10px;
  margin-bottom:6px;cursor:pointer;transition:border-color .15s;
}
.quest-row:hover{border-color:var(--border2)}
.quest-row.done{opacity:.45}
.quest-row.done .qtext{text-decoration:line-through;color:var(--muted)}
.qcheck{
  width:20px;height:20px;border:2px solid var(--border2);background:var(--bg3);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-family:var(--pixel);font-size:10px;transition:all .2s;margin-top:1px;
}
.qcheck.done{background:var(--green);border-color:var(--green);color:#000;box-shadow:0 0 8px rgba(57,255,20,.4)}
.qtext{flex:1;font-family:var(--vt);font-size:18px;line-height:1.3}
.qright{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.diff-tag{font-family:var(--pixel);font-size:7px;padding:2px 6px}
.diff-easy{background:rgba(57,255,20,.15);color:var(--green)}
.diff-medium{background:rgba(255,215,0,.15);color:var(--gold)}
.diff-hard{background:rgba(255,51,85,.15);color:var(--red)}
.diff-epic{background:rgba(155,89,255,.15);color:var(--purple)}
.qxp{font-size:10px;color:var(--muted);font-family:var(--mono)}
.custom-tag{font-family:var(--pixel);font-size:6px;color:var(--purple);background:rgba(155,89,255,.15);padding:2px 5px;margin-left:6px}
.del-btn{font-size:18px;color:var(--muted);background:none;border:none;cursor:pointer;padding:0 2px;line-height:1}
.del-btn:hover{color:var(--red)}

/* ═══════════════════════════════════════════
   PROFILE PAGE
═══════════════════════════════════════════ */
.profile-card{
  background:var(--card);border:2px solid var(--cyan);
  padding:20px;text-align:center;margin-bottom:16px;
  position:relative;overflow:hidden;
}
.profile-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--cyan),var(--green),var(--cyan));
}
.profile-av{
  width:72px;height:72px;background:var(--bg3);border:3px solid var(--cyan);
  display:flex;align-items:center;justify-content:center;font-size:38px;
  margin:0 auto 12px;box-shadow:0 0 20px rgba(0,229,255,.3);
}
.profile-name{font-family:var(--pixel);font-size:13px;color:var(--cyan);margin-bottom:4px}
.profile-class{font-size:13px;color:var(--muted2);margin-bottom:14px}
.profile-xp-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted2);margin-bottom:4px}
.profile-xp-sub{font-size:11px;color:var(--muted2);text-align:center;margin-top:4px}
.profile-nums{display:flex;gap:8px;justify-content:center;margin-top:14px}
.pnum{background:var(--bg3);border:1px solid var(--border);padding:10px 16px;text-align:center}
.pnum-val{font-family:var(--pixel);font-size:13px;color:var(--cyan)}
.pnum-label{font-size:9px;color:var(--muted);margin-top:3px}
.streak-num{color:var(--orange)!important}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:14px}
.stat-cell{background:var(--bg3);border:1px solid var(--border);padding:10px}
.stat-cell-name{font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px}
.stat-cell-val{font-family:var(--pixel);font-size:14px;color:var(--green);margin-top:4px}

.ptabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:14px}
.ptab{flex:1;padding:10px;text-align:center;font-family:var(--pixel);font-size:7px;cursor:pointer;color:var(--muted2);border:none;background:transparent;text-transform:uppercase;border-bottom:2px solid transparent;margin-bottom:-2px}
.ptab.active{color:var(--cyan);border-bottom-color:var(--cyan)}

.act-item{background:var(--card);border:1px solid var(--border);padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.act-icon{font-size:20px;flex-shrink:0}
.act-text{flex:1;font-family:var(--vt);font-size:17px;line-height:1.3}
.act-meta{font-size:10px;color:var(--muted);font-family:var(--mono)}
.act-xp{font-family:var(--pixel);font-size:9px;color:var(--green);flex-shrink:0}

.ach-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.ach-card{background:var(--card);border:1px solid var(--border);padding:14px;text-align:center}
.ach-card.unlocked{border-color:rgba(255,215,0,.4);background:linear-gradient(135deg,var(--card),rgba(255,215,0,.05))}
.ach-card.locked{opacity:.4}
.ach-icon{font-size:28px;margin-bottom:6px;display:block}
.ach-name{font-family:var(--pixel);font-size:7px;margin-bottom:4px}
.ach-desc{font-size:11px;color:var(--muted2);line-height:1.4}
.ach-date{font-family:var(--pixel);font-size:7px;color:var(--gold);margin-top:6px}

.settings-card{background:var(--card);border:1px solid var(--border);padding:14px;margin-bottom:10px}
.settings-title{font-family:var(--pixel);font-size:8px;color:var(--cyan);margin-bottom:12px}
.inline-row{display:flex;gap:8px;align-items:flex-end}
.inline-row input{flex:1}

/* ═══════════════════════════════════════════
   LEADERBOARD
═══════════════════════════════════════════ */
.lb-title-bar{text-align:center;margin-bottom:20px}
.lb-main-title{font-family:var(--pixel);font-size:12px;color:var(--gold);text-shadow:0 0 16px rgba(255,215,0,.4);margin-bottom:6px}
.lb-sort-row{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
.lb-sort-btn{font-family:var(--pixel);font-size:7px;padding:5px 12px;border:1px solid var(--border2);background:var(--card);color:var(--muted2);cursor:pointer;text-transform:uppercase}
.lb-sort-btn.active{background:var(--gold);color:#000;border-color:var(--gold)}
.lb-row{background:var(--card);border:1px solid var(--border);padding:12px;display:flex;align-items:center;gap:10px;margin-bottom:6px;cursor:pointer}
.lb-row:active{background:var(--card2)}
.lb-row.me{border-color:rgba(0,229,255,.4);background:rgba(0,229,255,.04)}
.lb-rank{font-family:var(--pixel);font-size:10px;color:var(--muted);width:28px;text-align:center;flex-shrink:0}
.lb-av{width:40px;height:40px;background:var(--bg3);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.lb-info{flex:1;min-width:0}
.lb-name{font-family:var(--pixel);font-size:9px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-sub{font-size:11px;color:var(--muted2);margin-top:2px}
.lb-val{text-align:right;flex-shrink:0}
.lb-val-main{font-family:var(--pixel);font-size:10px;color:var(--cyan)}
.lb-val-sub{font-size:10px;color:var(--muted2)}

.cat-progress-section{margin-top:8px}
.cat-prog-row{background:var(--card);border:1px solid var(--border);padding:10px 12px;display:flex;align-items:center;gap:10px;margin-bottom:5px;cursor:pointer}

function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function keys(p){return Object.keys(p.done||{})}
function getLevel(xp){let l=1;XP_TABLE.forEach((v,i)=>{if(xp>=v)l=i+1});return Math.min(l,20)}
function getClass(lv){let c=CLASSES[0];CLASSES.forEach(x=>{if(lv>=x.l)c=x});return c}
function xpForLv(l){return XP_TABLE[Math.min(l-1,XP_TABLE.length-1)]||0}
function xpForNext(l){return XP_TABLE[Math.min(l,XP_TABLE.length-1)]||99999}
function timeAgo(ts){const d=Date.now()-ts,m=Math.floor(d/60000);if(m<1)return'just now';if(m<60)return m+'m ago';const h=Math.floor(m/60);if(h<24)return h+'h ago';return Math.floor(h/24)+'d ago'}
function getDiff(q){const s=q.toLowerCase();if(s.includes('month')||s.includes('novel')||s.includes('publish')||s.includes('championship')||s.includes('marathon')||s.includes('kilimanjaro')||s.includes('antarctica')||s.includes('war and peace')||s.includes('ulysses'))return'epic';if(s.includes('week')||s.includes('every day')||s.includes('a day for')||s.includes('graduate')||s.includes('country')||s.includes('continent')||s.includes('mountain')||s.includes('scuba')||s.includes('business')||s.includes('tough mudder'))return'hard';if(s.includes('new')||s.includes('first')||s.includes('visit')||s.includes('read')||s.includes('write')||s.includes('cook')||s.includes('travel')||s.includes('learn'))return'medium';return'easy'}
function getDailyQuote(){return QUOTES[Math.floor(Date.now()/86400000)%QUOTES.length]}

function newProfile(username,avatar){
  return{username,avatar,xp:0,level:1,streak:0,lastActive:null,done:{},achievements:{},stats:{Strength:0,Intellect:0,Agility:0,Wisdom:0,Charisma:0,Vitality:0,Creativity:0,Wanderlust:0},customQuests:{}};

function getActiveId(){ return _session?.user?.id || null; }

function loadProfile(){
  if(!_session) return null;
  const cached = LS.get('lul_profile_'+_session.user.id, null);
  return cached || _profile;
}

function saveProfile(p){
  if(!_session) return;
  const id = _session.user.id;
  LS.set('lul_profile_'+id, p);
  _profile = p;
  // Async sync to Supabase
  supa.from('profiles').upsert({
    id,
    username: p.username,
    avatar: p.avatar,
    xp: p.xp,
    level: p.level,
    streak: p.streak,
    last_active: p.lastActive,
    stats: p.stats,
    done: p.done,
    achievements: p.achievements,
    custom_quests: p.customQuests || {},
    custom_missions: LS.get('lul_custom_missions', []),
    mission_state: LS.get('lul_missions', {})
  }).then(({error}) => { if(error) console.warn('Profile sync error:', error.message); });
}

async function loadProfileFromDB(){
  if(!_session) return null;
  const {data, error} = await supa.from('profiles').select('*').eq('id', _session.user.id).single();
  if(error || !data) return null;
  const p = {
    username: data.username,
    avatar: data.avatar || '⚔️',
    xp: data.xp || 0,
    level: data.level || 1,
    streak: data.streak || 0,
    lastActive: data.last_active,
    stats: data.stats || {Strength:0,Intellect:0,Agility:0,Wisdom:0,Charisma:0,Vitality:0,Creativity:0,Wanderlust:0},
    done: data.done || {},
    achievements: data.achievements || {},
    customQuests: data.custom_quests || {}
  };
  if(data.custom_missions) LS.set('lul_custom_missions', data.custom_missions);
  if(data.mission_state) LS.set('lul_missions', data.mission_state);
  LS.set('lul_profile_'+_session.user.id, p);
  _profile = p;
  return p;
}

async function doLogin(){
  const u = document.getElementById('l-user')?.value.trim();
  const pw = document.getElementById('l-pass')?.value;
  const err = document.getElementById('l-err');
  const btn = document.querySelector('#lform-login .btn-green');
  err.textContent = '';
  if(!u||!pw){err.textContent='Please fill in all fields.';return}
  if(btn) btn.textContent = 'Signing in...';

  // Try email login, or look up email by username
  let email = u;
  if(!u.includes('@')){
    // Username login -- look up email via profiles table
    const {data} = await supa.from('profiles').select('id').eq('username', u).single();
    if(!data){ err.textContent='Username not found.'; if(btn) btn.textContent='▶ START'; return; }
    // Get email from auth -- we store it in metadata
    const {data:authData} = await supa.auth.admin?.getUserById?.(data.id) || {data:null};
    if(!authData){
      err.textContent='Please sign in with your email address.';
      if(btn) btn.textContent='▶ START';
      return;
    }
    email = authData.user?.email;
  }

  const {data, error} = await supa.auth.signInWithPassword({email, password:pw});
  if(error){ err.textContent = error.message; if(btn) btn.textContent='▶ START'; return; }
  _session = data.session;
  await loadProfileFromDB();
  await loadFeedFromDB();
  await loadDailyFromDB();
  await loadTourneysFromDB();
  await loadSubsFromDB();
  bootApp();
}

async function doSignup(){
  const u = document.getElementById('s-user')?.value.trim();
  const em = document.getElementById('s-email')?.value.trim().toLowerCase();
  const pw = document.getElementById('s-pass')?.value;
  const err = document.getElementById('s-err');
  const btn = document.querySelector('#lform-signup .btn-green');
  err.textContent = '';
  if(!u||!em||!pw){err.textContent='Please fill in all fields.';return}
  if(u.length<2){err.textContent='Username must be at least 2 characters.';return}
  if(pw.length<6){err.textContent='Password must be at least 6 characters.';return}
  // Check username not taken
  const {data:existing} = await supa.from('profiles').select('id').eq('username',u).single();
  if(existing){err.textContent='Username already taken.';return}

  if(btn) btn.textContent = 'Creating...';
  const {data, error} = await supa.auth.signUp({
    email: em,
    password: pw,
    options:{ data:{ username: u, avatar: selectedAv } }
  });
  if(error){ err.textContent=error.message; if(btn) btn.textContent='▶ CREATE CHARACTER'; return; }

  if(data.session){
    // Email confirmation off -- logged in immediately
    _session = data.session;
    await loadProfileFromDB();
    bootApp();
    showToast('🎉','Character created!', u+' is ready to level up','gold');
  } else {
    // Email confirmation required
    err.style.color='var(--green)';
    err.textContent='Check your email and click the confirmation link, then come back and sign in!';
    if(btn) btn.textContent='▶ CREATE CHARACTER';
  }
}

// QUEST COMPLETION ENGINE
// ===============================================================
function completeQuest(catId,idx,text){
  let p=loadProfile();
  const key=catId+'_'+idx;
  if(p.done[key])return null;
  const cat=CATS.find(c=>c.id===catId);
  const diff=getDiff(text);
  const xpGain=DIFF_XP[diff];
  p.done[key]=Date.now();
  p.xp+=xpGain;
  if(cat&&cat.stat)p.stats[cat.stat]=(p.stats[cat.stat]||0)+1;
  p.level=getLevel(p.xp);
  const today=new Date().toDateString();
  const yesterday=new Date(Date.now()-86400000).toDateString();
  const lastDate=p.lastActive?new Date(p.lastActive).toDateString():null;
  if(lastDate!==today){p.streak=lastDate===yesterday?(p.streak||0)+1:1;}
  p.lastActive=Date.now();
  saveProfile(p);
  addFeed({type:'quest',avatar:p.avatar||'⚔️',username:p.username,level:p.level,catId,catIcon:cat?.icon||'✅',catName:cat?.name||catId,quest:text,stat:cat?.stat,xp:xpGain,diff,ts:Date.now()});
  const newAchs=checkAchs(p);
  // Check if any missions were completed by this quest
  setTimeout(()=>{ allMissions().forEach(m=>{ if(!getMissionState()[m.id+'_celebrated']) checkMissionComplete(m.id); }); },200);
  return{xpGain,diff,newAchs};
}

function completeCustomQuest(catId,cqId){
  let p=loadProfile();
  const key='custom_'+catId+'_'+cqId;
  if(p.done[key])return null;
  const cq=(p.customQuests?.[catId]||[]).find(q=>q.id===cqId);
  if(!cq)return null;
  const xpGain=DIFF_XP[cq.diff||'medium'];
  p.done[key]=Date.now();
  p.xp+=xpGain;
  p.level=getLevel(p.xp);
  const today=new Date().toDateString();
  const yesterday=new Date(Date.now()-86400000).toDateString();
  const lastDate=p.lastActive?new Date(p.lastActive).toDateString():null;
  if(lastDate!==today){p.streak=lastDate===yesterday?(p.streak||0)+1:1;}
  p.lastActive=Date.now();
  saveProfile(p);
  const cat=CATS.find(c=>c.id===catId);
  addFeed({type:'quest',avatar:p.avatar||'⚔️',username:p.username,level:p.level,catId,catIcon:'⭐',catName:(cat?.name||catId)+' (custom)',quest:cq.text,xp:xpGain,diff:cq.diff,ts:Date.now()});
  const newAchs=checkAchs(p);
  return{xpGain,diff:cq.diff,newAchs};
}

function checkAchs(p){
  const newOnes=[];
  const count=keys(p).length;
  for(const a of ACHIEVEMENTS){
    if(!p.achievements[a.id]&&a.check(p,count)){
      p.achievements[a.id]=Date.now();
      newOnes.push(a);
      addFeed({type:'achievement',avatar:p.avatar||'⚔️',username:p.username,achIcon:a.icon,achName:a.name,achDesc:a.desc,ts:Date.now()});
    }
  }
  saveProfile(p);
  return newOnes;
}

let curCat=CATS[0];
let qSearch='';

function renderQuests(){
  const p=loadProfile();if(!p)return;
  const chips=CATS.map(cat=>{
    const d=keys(p).filter(k=>k.startsWith(cat.id+'_')).length;
    return`<div class="cat-chip${cat.id===curCat.id?' active':''}${d>0?' hp':''}" onclick="selectCat('${cat.id}')">
      <span class="cdot"></span>${cat.icon} ${cat.name}
    </div>`;
  }).join('');

  const cat=curCat;
  const custom=(p.customQuests||{})[cat.id]||[];
  const catDone=keys(p).filter(k=>k.startsWith(cat.id+'_')).length;
  const customDone=custom.filter(cq=>p.done['custom_'+cat.id+'_'+cq.id]).length;
  const total=cat.quests.length+custom.length;
  const done=catDone+customDone;
  const pct=total?Math.round((done/total)*100):0;

  const filtered=cat.quests.filter(q=>!qSearch||q.toLowerCase().includes(qSearch.toLowerCase()));
  const customFiltered=custom.filter(cq=>!qSearch||cq.text.toLowerCase().includes(qSearch.toLowerCase()));

  const builtInHtml=filtered.map(q=>{
    const idx=cat.quests.indexOf(q);
    const key=cat.id+'_'+idx;
    const isDone=!!p.done[key];
    const diff=getDiff(q);
    return`<div class="quest-row${isDone?' done':''}" onclick="tapQuest('${cat.id}',${idx})">
      <div class="qcheck${isDone?' done':''}">${isDone?'✓':''}</div>
      <div class="qtext">${esc(q)}</div>
      <div class="qright">
        <span class="diff-tag diff-${diff}">${diff}</span>
        <span class="qxp">+${DIFF_XP[diff]}xp</span>
      </div>
    </div>`;
  }).join('');

  const customHtml=customFiltered.map(cq=>{
    const key='custom_'+cat.id+'_'+cq.id;
    const isDone=!!p.done[key];
    return`<div class="quest-row${isDone?' done':''}">
      <div class="qcheck${isDone?' done':''}" onclick="tapCustomQuest('${cat.id}','${cq.id}')">${isDone?'✓':''}</div>
      <div class="qtext">${esc(cq.text)}<span class="custom-tag">CUSTOM</span></div>
      <div class="qright" style="flex-direction:row;align-items:center;gap:6px">
        <span class="diff-tag diff-${cq.diff||'medium'}">${cq.diff||'medium'}</span>
        <span class="qxp">+${DIFF_XP[cq.diff||'medium']}xp</span>
        ${!isDone?`<button class="del-btn" onclick="deleteCustom('${cat.id}','${cq.id}');event.stopPropagation()">×</button>`:''}
      </div>
    </div>`;
  }).join('');

  document.getElementById('quests-c').innerHTML=`
    <div class="cat-scroller">${chips}</div>
    <input type="search" placeholder="Search quests..." value="${esc(qSearch)}" oninput="qSearch=this.value;renderQuests()" style="margin-bottom:12px" autocorrect="off" spellcheck="false">
    <div class="cat-header">
      <div class="cat-title-row">
        <span class="cat-icon-big">${cat.icon}</span>
        <div class="cat-title">${esc(cat.name)}</div>
      </div>
      <div class="cat-prog-label"><span>${done}/${total} completed</span><span>${pct}%</span></div>
      <div class="xp-bar-wrap"><div class="xp-bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="add-quest-row">
      <input type="text" id="nq-input" placeholder="Add your own quest..." maxlength="120" autocorrect="off">
      <select id="nq-diff"><option value="easy">Easy</option><option value="medium" selected>Med</option><option value="hard">Hard</option><option value="epic">Epic</option></select>
      <button class="btn btn-cyan btn-sm" style="flex-shrink:0;padding:10px 14px;font-size:14px" onclick="addCustom('${cat.id}')">+</button>
    </div>
    ${customHtml}${builtInHtml}
    ${!filtered.length&&!customFiltered.length?'<div class="empty"><div class="empty-emoji">🔍</div><div class="empty-text">No quests match your search.</div></div>':''}
  `;
}

function selectCat(id){curCat=CATS.find(c=>c.id===id)||curCat;qSearch='';renderQuests()}

function tapQuest(catId,idx){
  const p=loadProfile();
  if(p.done[catId+'_'+idx])return;
  const cat=CATS.find(c=>c.id===catId);
  const result=completeQuest(catId,idx,cat.quests[idx]);
  if(!result)return;
  xpPop();
  showToast('⚡','+'+result.xpGain+' XP',cat.quests[idx].substring(0,55),'green');
  result.newAchs.forEach((a,i)=>setTimeout(()=>showToast('🏆','Achievement!',a.icon+' '+a.name,'gold'),900+i*600));
  updateTopbar();
  renderQuests();
  if(curPage==='home')renderHome();
}

function tapCustomQuest(catId,cqId){
  const p=loadProfile();
  if(p.done['custom_'+catId+'_'+cqId])return;
  const result=completeCustomQuest(catId,cqId);
  if(!result)return;
  xpPop();
  showToast('⚡','+'+result.xpGain+' XP','Custom quest complete!','green');
  result.newAchs.forEach((a,i)=>setTimeout(()=>showToast('🏆','Achievement!',a.icon+' '+a.name,'gold'),900+i*600));
  updateTopbar();
  renderQuests();
}

function addCustom(catId){
  const input=document.getElementById('nq-input');
  const diff=document.getElementById('nq-diff')?.value||'medium';
  const text=input?.value.trim();
  if(!text)return;
  const p=loadProfile();
  if(!p.customQuests)p.customQuests={};
  if(!p.customQuests[catId])p.customQuests[catId]=[];
  p.customQuests[catId].push({id:'cq_'+Date.now(),text,diff});
  saveProfile(p);
  input.value='';
  showToast('✅','Quest added!',text.substring(0,50),'green');
  renderQuests();
}

function deleteCustom(catId,cqId){
  const p=loadProfile();
  if(!p.customQuests?.[catId])return;
  p.customQuests[catId]=p.customQuests[catId].filter(q=>q.id!==cqId);
  saveProfile(p);
  renderQuests();
}

let proofData=null;

function renderArena(){
  const p=loadProfile();if(!p)return;
  const tourneys=getTourneys();
  const subs=getSubs();
  const active=tourneys.filter(t=>t.active);
  const past=tourneys.filter(t=>!t.active);

  const activeHtml=active.length?active.map(t=>{
    const tSubs=subs.filter(s=>s.tid===t.id&&s.status==='approved');
    const lbMap={};tSubs.forEach(s=>{lbMap[s.username]=(lbMap[s.username]||0)+1});
    const lb=Object.entries(lbMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
    const myEntry=subs.find(s=>s.tid===t.id&&s.username===p.username);
    const daysLeft=Math.max(0,Math.ceil((new Date(t.endDate)-Date.now())/86400000));
    const lbHtml=lb.length?lb.map(([name,count],i)=>`<div class="tourney-lb-row">

      <span style="font-family:var(--pixel);font-size:8px;color:var(--green)">${count} approved</span>
    </div>`).join(''):'';
    const statusHtml=!myEntry?`<button class="btn btn-orange btn-full btn-sm" style="background:var(--orange);color:#000;border-color:var(--orange);margin-top:8px" onclick="openSubmit('${t.id}')">📸 SUBMIT PROOF</button>`:
      myEntry.status==='pending'?`<div class="sub-status-pending">⏳ Pending GM review</div>`:
      myEntry.status==='approved'?`<div class="sub-status-approved">✓ APPROVED  --  you're on the board!</div>`:
      `<div class="sub-status-rejected">❌ Rejected: ${esc(myEntry.gmNote||'See GM for details')}<br><button class="btn btn-ghost btn-sm btn-full" style="margin-top:8px" onclick="openSubmit('${t.id}')">Resubmit</button></div>`;
    return`<div class="tourney-card">
      <div class="tourney-name">⚡ ${esc(t.name)}</div>
      <div style="font-size:12px;color:var(--muted2);margin-bottom:8px">${esc(t.description||'')}</div>
      <div class="tourney-quest"><span style="margin-right:6px">📋</span>${esc(t.questName)}</div>
      <div class="tourney-meta"><span>${daysLeft} days remaining</span><span>Ends ${new Date(t.endDate).toLocaleDateString()}</span></div>
      ${lb.length?`<div style="margin-bottom:10px">${lbHtml}</div>`:''}
      ${statusHtml}
    </div>`;
  }).join(''):`<div class="empty"><div class="empty-emoji">🏟️</div><div class="empty-text">No active tournaments yet.<br>Check back soon!</div></div>`;

  const pastHtml=past.length?`<div class="section-sep">Past Tournaments</div>${past.map(t=>{
    const tSubs=subs.filter(s=>s.tid===t.id&&s.status==='approved');
    const lbMap={};tSubs.forEach(s=>{lbMap[s.username]=(lbMap[s.username]||0)+1});
    const winner=Object.entries(lbMap).sort((a,b)=>b[1]-a[1])[0];
    return`<div style="background:var(--card);border:1px solid var(--border);padding:10px 12px;margin-bottom:6px;opacity:.6">
      <div style="font-family:var(--pixel);font-size:9px">${esc(t.name)}</div>
      <div style="font-size:12px;color:var(--muted2);margin-top:4px">${winner?'🏆 Winner: '+esc(winner[0]):'No submissions'}</div>
    </div>`;
  }).join('')}`:'';

  document.getElementById('arena-c').innerHTML=`
    <div class="arena-header">
      <div class="arena-title">⚡ ARENA</div>
      <div style="font-size:12px;color:var(--muted2)">Compete. Prove it. Win.</div>
    </div>
    ${activeHtml}${pastHtml}
    <div class="coming-soon-box">
      <div style="font-size:28px;margin-bottom:8px">🆚</div>
      <div style="font-family:var(--pixel);font-size:9px;margin-bottom:6px">VS. LEADERBOARDS</div>
      <div style="font-size:12px;color:var(--muted2);margin-bottom:8px">Head-to-head challenges between players</div>
      <div style="font-family:var(--pixel);font-size:7px;color:var(--orange);background:rgba(255,107,0,.15);padding:4px 10px;display:inline-block">COMING SOON</div>
    </div>
  `;
}

function openSubmit(tid){
  const t=getTourneys().find(t=>t.id===tid);if(!t)return;

function prevProof(input){
  if(!input.files[0])return;
  const r=new FileReader();
  r.onload=e=>{
    proofData=e.target.result;
    document.getElementById('proof-prev').innerHTML=`<img src="${proofData}" style="max-height:100px;max-width:100%;object-fit:cover">`;
    document.getElementById('proof-lbl').textContent=input.files[0].name;
  };
  r.readAsDataURL(input.files[0]);
}

function submitProof(tid){
  const note=document.getElementById('proof-note')?.value.trim();
  const err=document.getElementById('sub-err');
  if(!proofData){err.style.display='block';err.textContent='Please upload a photo.';return}
  if(!note||note.length<30){err.style.display='block';err.textContent='Please write a more detailed personal note (30+ characters).';return}
  const p=loadProfile();
  const t=getTourneys().find(t=>t.id===tid);
  const subs=getSubs().filter(s=>!(s.tid===tid&&s.username===p.username));
  subs.unshift({id:'sub_'+Date.now(),tid,tName:t.name,questName:t.questName,username:p.username,avatar:p.avatar||'⚔️',note,photo:proofData,status:'pending',gmNote:'',submittedAt:Date.now()});
  saveSubs(subs);
  proofData=null;
  closeModal();
  showToast('📸','Submitted!','Pending GM review','green');
  renderArena();
}

  sub.gmNote=document.getElementById('gmnote-'+subId)?.value.trim()||'';
  sub.status=action==='approve'?'approved':'rejected';

  saveSubs(subs);
  showToast(action==='approve'?'✅':'❌',action==='approve'?'Approved!':'Rejected',sub.username,action==='approve'?'green':'');
  renderGM();
}

// AUDIO ENGINE - Retro 8-bit sounds via Web Audio API
// ===============================================================
const Audio8 = (() => {
  let ctx = null;
  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  function note(freq, start, dur, vol=0.3, type='square') {
    try {
      const c = getCtx();
      const o = c.createOscillator();
      const g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = type;
      o.frequency.setValueAtTime(freq, start);
      g.gain.setValueAtTime(vol, start);
      g.gain.exponentialRampToValueAtTime(0.001, start + dur);
      o.start(start); o.stop(start + dur + 0.01);
    } catch(e) {}
  }
  return {
    // Mario level clear - classic ascending fanfare
    missionComplete() {
      try {
        const c = getCtx();
        const t = c.currentTime;
        const melody = [
          [523,0],[659,0.1],[784,0.2],[1047,0.3],
          [784,0.5],[1047,0.6],[1319,0.8]
        ];
        melody.forEach(([f,d]) => note(f, t+d, 0.18, 0.25, 'square'));
        // harmony
        const harm = [[330,0],[415,0.1],[523,0.2],[659,0.3],[523,0.5],[659,0.6],[784,0.8]];
        harm.forEach(([f,d]) => note(f, t+d, 0.15, 0.12, 'square'));
        // final chord
        [523,659,784,1047].forEach(f => note(f, t+1.1, 0.5, 0.15, 'sine'));
      } catch(e) {}
    },
    // Quest done - quick blip
    questDone() {
      try {
        const c = getCtx(); const t = c.currentTime;
        note(440, t, 0.06, 0.2, 'square');
        note(660, t+0.07, 0.08, 0.2, 'square');
      } catch(e) {}
    },
    // Daily complete - coin sound
    dailyDone() {
      try {
        const c = getCtx(); const t = c.currentTime;
        note(987, t, 0.05, 0.25, 'square');
        note(1319, t+0.06, 0.12, 0.2, 'square');
      } catch(e) {}
    },
    // All dailies done - fanfare
    allDailyDone() {
      try {
        const c = getCtx(); const t = c.currentTime;
        [523,659,784,659,784,1047].forEach((f,i) => note(f, t+i*0.1, 0.12, 0.2, 'square'));
        note(1047, t+0.7, 0.4, 0.2, 'sine');
      } catch(e) {}
    }
  };
})();

function getMissionState() { return LS.get('lul_missions', {}); }
function saveMissionState(s) { LS.set('lul_missions', s); }
function getCustomMissions() { return LS.get('lul_custom_missions', []); }
function saveCustomMissions(m) { LS.set('lul_custom_missions', m); }

function allMissions() {
  return [...BUILT_IN_MISSIONS, ...getCustomMissions()];
}

function missionQuestKey(missionId, questIdx) {
  return 'mq_' + missionId + '_' + questIdx;
}

function missionProgress(mission, profile) {
  const done = mission.quests.filter((q, i) => {
    if (q.catId === 'custom') {
      // custom mission objectives tracked by mission+index key
      return !!profile.done[missionQuestKey(mission.id, i)];
    }
    return !!profile.done[q.catId + '_' + q.idx];
  }).length;
  return { done, total: mission.quests.length, pct: Math.round((done / mission.quests.length) * 100) };
}

function checkMissionComplete(missionId) {
  const p = loadProfile();
  const mission = allMissions().find(m => m.id === missionId);
  if (!mission) return false;
  const prog = missionProgress(mission, p);
  const state = getMissionState();
  const wasComplete = state[missionId + '_celebrated'];
  if (prog.done === prog.total && !wasComplete) {
    state[missionId + '_celebrated'] = Date.now();
    // Award bonus XP
    p.xp += mission.xpBonus;
    p.level = getLevel(p.xp);
    saveProfile(p);
    saveMissionState(state);
    addFeed({type:'mission', avatar:p.avatar||'⚔️', username:p.username, level:p.level,
      missionName:mission.name, missionIcon:mission.icon, xp:mission.xpBonus, ts:Date.now()});
    Audio8.missionComplete();
    setTimeout(() => showToast('🎯', 'MISSION COMPLETE!', mission.icon + ' ' + mission.name + ' +' + mission.xpBonus + ' XP', 'gold'), 300);
    return true;
  }
  return false;
}

function renderMissions() {
  const p = loadProfile(); if (!p) return;
  const missions = allMissions();
  const state = getMissionState();

  const missionHtml = missions.map(m => {
    const prog = missionProgress(m, p);
    const isComplete = prog.done === prog.total;
    const celebrated = !!state[m.id + '_celebrated'];
    const questRows = m.quests.map((q, qi) => {
      const isDone = q.catId === 'custom'
        ? !!p.done[missionQuestKey(m.id, qi)]
        : !!p.done[q.catId + '_' + q.idx];
      const clickHandler = q.catId === 'custom' && !isDone
        ? `onclick="completeMissionObjective('${m.id}',${qi},${q.xp||25})"`
        : '';
      const xpBadge = q.catId === 'custom'
        ? `<span style="font-family:var(--pixel);font-size:7px;color:var(--gold);margin-left:6px">+${q.xp||25}xp</span>`
        : '';
      return `<div class="mission-quest-row${isDone ? ' done' : ''}" ${clickHandler} style="${q.catId==='custom'&&!isDone?'cursor:pointer':''}">
        <div class="mqcheck${isDone ? ' done' : ''}">${isDone ? '✓' : ''}</div>
        <span style="flex:1">${esc(q.label)}</span>
        ${xpBadge}
      </div>`;
    }).join('');

    return `<div class="mission-card${isComplete ? ' complete' : ''}" style="border-left-color:${esc(m.color)}">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
        <span style="font-size:24px">${m.icon}</span>
        <div style="flex:1">
          <div class="mission-name">${esc(m.name)}</div>
          <div class="mission-desc">${esc(m.desc)}</div>
        </div>
        <div class="mission-xp-badge">+${m.xpBonus} XP</div>
      </div>
      <div class="mission-prog-label">
        <span>${prog.done}/${prog.total} quests</span>
        <span>${prog.pct}%</span>
      </div>
      <div class="mission-prog-wrap">
        <div class="mission-prog-fill" style="width:${prog.pct}%;background:linear-gradient(90deg,${esc(m.color)},${esc(m.color)}aa)"></div>
      </div>
      <div class="mission-quests">${questRows}</div>
      ${isComplete ? '<div class="mission-complete-badge">✓ MISSION COMPLETE</div>' : ''}
      ${m.isCustom && isGM() ? `
        <div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px">
          <div style="font-family:var(--pixel);font-size:7px;color:var(--muted2);margin-bottom:6px">ADD OBJECTIVE</div>

            <input type="number" id="mq-xp-${m.id}" value="25" min="5" max="200" style="width:56px" onclick="event.stopPropagation()">
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-ghost btn-sm" style="flex:1;font-size:7px" onclick="addObjectiveToMission('${m.id}')">+ Add</button>
            <button class="btn btn-danger btn-sm" style="font-size:7px" onclick="deleteCustomMission('${m.id}')">Delete</button>

  renderMissions();
}

function removeDraftQuest(idx) {
  _draftMission.quests.splice(idx, 1);
  renderMissions();
}

function clearDraftMission() {
  _draftMission = { name:'', desc:'', icon:'🎯', xp:200, quests:[] };
  renderMissions();
}

function saveDraftMission() {
  const name = _draftMission.name.trim();
  if (!name) { showToast('❌','Give your mission a name','',''); return; }
  if (!_draftMission.quests.length) { showToast('❌','Add at least one objective','',''); return; }
  const custom = getCustomMissions();
  custom.push({
    id: 'cm_' + Date.now(),
    name,
    desc: _draftMission.desc || '',
    xpBonus: _draftMission.xp || 200,
    icon: _draftMission.icon || '🎯',
    color: '#00e5ff',
    isCustom: true,
    quests: _draftMission.quests.map(q => ({ ...q, idx: -1 }))
  });
  saveCustomMissions(custom);
  _draftMission = { name:'', desc:'', icon:'🎯', xp:200, quests:[] };
  showToast('🎯','Mission created!', name, 'green');
  renderMissions();
}

function deleteCustomMission(id) {
  const custom = getCustomMissions().filter(m => m.id !== id);
  saveCustomMissions(custom);
  renderMissions();
}

function addObjectiveToMission(missionId) {
  const labelEl = document.getElementById('mq-label-' + missionId);
  const xpEl = document.getElementById('mq-xp-' + missionId);
  const label = labelEl?.value.trim();
  const xp = parseInt(xpEl?.value) || 25;
  if (!label) { showToast('❌','Enter an objective','',''); return; }
  const custom = getCustomMissions();
  const mission = custom.find(m => m.id === missionId);
  if (!mission) return;
  mission.quests.push({ catId:'custom', label, xp, idx:-1 });
  saveCustomMissions(custom);
  showToast('✅','Objective added!', label.substring(0,40), 'green');
  renderMissions();
}

function completeMissionObjective(missionId, questIdx, xpGain) {
  const p = loadProfile();
  const key = missionQuestKey(missionId, questIdx);
  if (p.done[key]) return;
  p.done[key] = Date.now();
  p.xp += xpGain;
  p.level = getLevel(p.xp);
  const today = new Date().toDateString();
  const yesterday = new Date(Date.now()-86400000).toDateString();
  const lastDate = p.lastActive ? new Date(p.lastActive).toDateString() : null;
  if (lastDate !== today) { p.streak = lastDate === yesterday ? (p.streak||0)+1 : 1; }
  p.lastActive = Date.now();
  saveProfile(p);
  Audio8.questDone();
  showToast('⚡', '+' + xpGain + ' XP', 'Objective complete!', 'green');
  setTimeout(() => { allMissions().forEach(m => { if(!getMissionState()[m.id+'_celebrated']) checkMissionComplete(m.id); }); }, 200);
  renderMissions();
}

function todayKey() { return 'daily_' + new Date().toDateString().replace(/ /g,'_'); }
function getDailyState() { return LS.get(todayKey(), {}); }
function saveDailyState(s) { LS.set(todayKey(), s); }
function getCustomDailies() { return LS.get('lul_custom_dailies', []); }
function saveCustomDailies(d) { LS.set('lul_custom_dailies', d); }
function allDailies() { return [...BUILT_IN_DAILIES, ...getCustomDailies()]; }

function msUntilMidnight() {
  const now = new Date();
  const midnight = new Date(now);
  midnight.setHours(24, 0, 0, 0);
  return midnight - now;
}

function formatCountdown(ms) {
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  return h + 'h ' + String(m).padStart(2,'0') + 'm ' + String(s).padStart(2,'0') + 's';
}

let _dailyTimer = null;
function renderDaily() {
  const p = loadProfile(); if (!p) return;
  const dailies = allDailies();
  const state = getDailyState();
  const doneTodayCount = dailies.filter(d => state[d.id]).length;
  const allDone = doneTodayCount === dailies.length;
  const pct = Math.round((doneTodayCount / dailies.length) * 100);
  const msLeft = msUntilMidnight();

  const dailyRows = dailies.map(d => {
    const isDone = !!state[d.id];
    return `<div class="daily-card${isDone ? ' done' : ''}" onclick="tapDaily('${d.id}')">
      <div class="daily-check${isDone ? ' done' : ''}">${isDone ? '✓' : ''}</div>
      <span class="daily-icon">${d.icon}</span>
      <span class="daily-name">${esc(d.name)}</span>
      <span class="daily-xp">+${d.xp}xp</span>
      ${d.isCustom && isGM() ? `<button class="del-btn" onclick="deleteCustomDaily('${d.id}');event.stopPropagation()">×</button>` : ''}
    </div>`;
  }).join('');

  document.getElementById('daily-c').innerHTML = `
    <div class="daily-header">
      <div class="daily-title">🌅 DAILY QUESTS</div>
      <div class="daily-reset" id="daily-countdown">Resets in ${formatCountdown(msLeft)}</div>
    </div>

    <div class="daily-prog-section">
      <div class="daily-prog-label">
        <span>${doneTodayCount}/${dailies.length} completed today</span>
        <span>${pct}%</span>
      </div>
      <div class="mission-prog-wrap">
        <div class="mission-prog-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--gold),var(--orange))"></div>
      </div>
    </div>

    ${allDone ? `<div style="background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.3);padding:10px;text-align:center;font-family:var(--pixel);font-size:8px;color:var(--gold);margin-bottom:14px;text-shadow:0 0 8px rgba(255,215,0,.4)">
      ★ ALL DAILIES COMPLETE! COME BACK TOMORROW ★
    </div>` : ''}

    ${isGM() ? `
    <div class="custom-mission-form" style="margin-bottom:16px">
      <div class="custom-mission-title">+ ADD CUSTOM DAILY</div>
      <div style="display:flex;gap:6px;margin-bottom:8px">
        <input type="text" id="cd-icon" placeholder="Icon" style="width:60px;flex-shrink:0" maxlength="4" value="⭐">
        <input type="text" id="cd-name" placeholder="Daily quest name..." maxlength="60" style="flex:1">
        <input type="number" id="cd-xp" placeholder="XP" style="width:60px;flex-shrink:0" value="15" min="5" max="100">
      </div>
      <button class="btn btn-cyan btn-full btn-sm" onclick="addCustomDaily()">Add Daily</button>
    </div>` : ''}

    ${dailyRows}
  `;

  // Live countdown
  clearInterval(_dailyTimer);
  _dailyTimer = setInterval(() => {
    const el = document.getElementById('daily-countdown');
    if (el) el.textContent = 'Resets in ' + formatCountdown(msUntilMidnight());
    else clearInterval(_dailyTimer);
  }, 1000);
}

function tapDaily(id) {
  const state = getDailyState();
  if (state[id]) return;
  const daily = allDailies().find(d => d.id === id);
  if (!daily) return;
  state[id] = Date.now();
  saveDailyState(state);

  const p = loadProfile();
  p.xp += daily.xp;
  p.level = getLevel(p.xp);
  const today = new Date().toDateString();
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  const lastDate = p.lastActive ? new Date(p.lastActive).toDateString() : null;
  if (lastDate !== today) { p.streak = lastDate === yesterday ? (p.streak||0)+1 : 1; }
  p.lastActive = Date.now();
  saveProfile(p);

  addFeed({type:'daily', avatar:p.avatar||'⚔️', username:p.username, level:p.level,
    dailyIcon:daily.icon, dailyName:daily.name, xp:daily.xp, ts:Date.now()});

  Audio8.dailyDone();
  showToast(daily.icon, '+' + daily.xp + ' XP', daily.name, 'green');

  // Check if all done
  const allD = allDailies();
  const newState = getDailyState();
  const allDoneNow = allD.every(d => newState[d.id]);
  if (allDoneNow) {
    setTimeout(() => {
      Audio8.allDailyDone();
      showToast('🌟', 'ALL DAILIES COMPLETE!', 'Incredible discipline!', 'gold');
    }, 600);
  }

  renderDaily();
}

function addCustomDaily() {
  const icon = document.getElementById('cd-icon')?.value.trim() || '⭐';
  const name = document.getElementById('cd-name')?.value.trim();
  const xp = parseInt(document.getElementById('cd-xp')?.value) || 15;
  if (!name) return;
  const custom = getCustomDailies();
  custom.push({ id: 'cd_' + Date.now(), icon, name, xp, isCustom: true });
  saveCustomDailies(custom);
  showToast('✅', 'Daily added!', name, 'green');
  renderDaily();
}

function deleteCustomDaily(id) {
  saveCustomDailies(getCustomDailies().filter(d => d.id !== id));
  renderDaily();
}

    const cc = Object.values(u.custom_quests||{}).reduce((a,arr)=>a+(Array.isArray(arr)?arr.length:0),0);
    const unlockedAchs = ACHIEVEMENTS.filter(a=>(u.achievements||{})[a.id]);
    const customs = Object.entries(u.custom_quests||{}).flatMap(([cat,arr])=>(Array.isArray(arr)?arr:[]).map(q=>q.text||''));
    return `<div class="gm-user-card">
      <div class="gm-user-top">
        <div class="gm-user-av">${u.avatar||'⚔️'}</div>
        <div style="flex:1">
          <div class="gm-user-name">${esc(u.username)}</div>
          <div class="gm-user-meta ${statusCls}">● ${statusLbl} · 🔥${u.streak||0} streak</div>
        </div>
        <div style="text-align:right">
          <div style="font-family:var(--pixel);font-size:10px;color:var(--cyan)">Lv.${u.level||1}</div>
          <div style="font-size:11px;color:var(--muted2)">${(u.xp||0).toLocaleString()} XP</div>
        </div>
      </div>
      <div class="gm-user-stats">
        <div class="gm-us"><div class="gm-us-val">${qc}</div><div class="gm-us-label">Quests</div></div>
        <div class="gm-us"><div class="gm-us-val">${ac}</div><div class="gm-us-label">Badges</div></div>
        <div class="gm-us"><div class="gm-us-val">${cc}</div><div class="gm-us-label">Custom</div></div>
      </div>
      ${unlockedAchs.length?'<div class="pill-row">'+unlockedAchs.map(a=>'<span class="pill-ach">'+a.icon+' '+esc(a.name)+'</span>').join('')+'</div>':''}
      ${customs.length?'<div class="pill-row">'+customs.slice(0,4).map(t=>'<span class="pill-custom">⭐ '+esc(t.substring(0,22))+(t.length>22?'...':'')+'</span>').join('')+(customs.length>4?'<span class="pill-custom">+'+(customs.length-4)+' more</span>':'')+'</div>':''}
    </div>`;
  }).join('') : '<div class="empty"><div class="empty-emoji">👤</div><div class="empty-text">No users yet.</div></div>';

  const pendingHtml = pending.length ? pending.map(s=>`
    <div class="sub-review-card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="width:36px;height:36px;background:var(--bg3);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:20px">${s.avatar}</div>
        <div>
          <div style="font-family:var(--pixel);font-size:9px;color:var(--cyan)">${esc(s.username)}</div>
          <div style="font-size:11px;color:var(--muted2)">${esc(s.tName||'')} · ${timeAgo(s.submittedAt)}</div>
        </div>
      </div>
      ${s.photo?'<img src="'+s.photo+'" class="sub-photo">':''}
      <div class="sub-note-box">"${esc(s.note)}"</div>
      <input type="text" id="gmnote-${s.id}" placeholder="Optional message to user..." style="margin-bottom:8px;font-size:12px">
      <div class="review-btns">
        <button class="btn btn-danger btn-sm" style="flex:1" onclick="reviewSub('${s.id}','reject')">✗ Reject</button>
        <button class="btn btn-green btn-sm" style="flex:1" onclick="reviewSub('${s.id}','approve')">✓ Approve</button>
      </div>
    </div>`).join('') : '<div class="empty"><div class="empty-emoji">✅</div><div class="empty-text">No pending submissions.</div></div>';

  const tourneyManageHtml = tourneys.map(t=>`
    <div class="tourney-manage-row">
      <div style="flex:1">
        <div style="font-family:var(--pixel);font-size:8px">${esc(t.name)}</div>
        <div style="font-size:11px;color:var(--muted2)">${esc(t.questName)}</div>
      </div>
      <button class="btn btn-sm ${t.active?'btn-danger':'btn-ghost'}" onclick="toggleTourney('${t.id}')">${t.active?'End':'Reopen'}</button>
    </div>`).join('');

  document.getElementById('gm-c').innerHTML=`
    <div class="gm-header-card">
      <div class="gm-title">👁️ GAME MASTER DASHBOARD</div>
      <div style="font-size:11px;color:var(--muted2)">Only you can see this</div>
      <button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="renderGM()">↻ Refresh</button>
    </div>
    <div class="gm-quote-card">
      <div class="gm-quote-mark">"</div>
      <div style="font-family:var(--pixel);font-size:7px;color:var(--purple);margin-bottom:10px;position:relative;z-index:1">QUOTE OF THE DAY</div>
      <div class="gm-quote-text">${esc(quote.text)}</div>
      <div class="gm-quote-source">-- ${esc(quote.source)}</div>
      <div class="gm-quote-origin">${esc(quote.origin)}</div>
    </div>
    <div class="gm-stats-grid">
      <div class="gm-stat"><div class="gm-stat-val">${daysLive}</div><div class="gm-stat-label">Days Live</div></div>
      <div class="gm-stat"><div class="gm-stat-val">${allUsers.length}</div><div class="gm-stat-label">Total Users</div></div>
      <div class="gm-stat"><div class="gm-stat-val">${pending.length}</div><div class="gm-stat-label">Pending</div></div>
      <div class="gm-stat"><div class="gm-stat-val">${subs.filter(s=>s.status==='approved').length}</div><div class="gm-stat-label">Approved</div></div>
    </div>
    <div class="gm-section">⏳ Pending Submissions (${pending.length})</div>
    ${pendingHtml}
    <div class="gm-section">⚡ Manage Tournaments</div>
    <button class="btn btn-purple btn-full btn-sm" style="margin-bottom:10px" onclick="openCreateTourney()">+ Create Tournament</button>
    ${tourneyManageHtml||'<div style="font-size:12px;color:var(--muted2);text-align:center;padding:12px">No tournaments yet.</div>'}
    <div class="gm-section">👤 All Users (${allUsers.length})</div>
    ${usersHtml}
    <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);text-align:center">
      <button class="btn btn-ghost btn-sm" onclick="gmLogout()">Exit GM Mode</button>
    </div>
  `;
}

// Check Supabase session on load
(async function init(){
  const {data:{session}} = await supa.auth.getSession();
  if(session){
    _session = session;
    await loadProfileFromDB();
    await loadFeedFromDB();
    await loadDailyFromDB();
    await loadTourneysFromDB();
    await loadSubsFromDB();
    bootApp();
  } else {
    document.getElementById('login-page').classList.remove('hidden');
    document.getElementById('app').style.display='none';
  }

  // Keep session fresh
  supa.auth.onAuthStateChange((event, session) => {
    _session = session;
    if(event==='SIGNED_OUT'){
      document.getElementById('app').style.display='none';
      document.getElementById('login-page').classList.remove('hidden');
    }
  });
})();

// Enter key on login
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const lLogin=document.getElementById('lform-login');
    const lSignup=document.getElementById('lform-signup');
    if(lLogin&&lLogin.style.display!=='none')doLogin();
    else if(lSignup&&lSignup.style.display!=='none')doSignup();
  }
});
</script>
